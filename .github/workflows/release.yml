name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example v0.1.5"
        required: true
      dry_run:
        description: "Validate only; do not create or push tags"
        type: boolean
        default: true
        required: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"

      - name: Validate release candidate
        env:
          DRY_RUN: "1"
          PUSH: "0"
        run: ./scripts/release-modules.sh "${{ inputs.version }}"

  publish:
    name: Publish module tags
    if: ${{ inputs.dry_run == false && github.ref_name == github.event.repository.default_branch }}
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tags
        env:
          DRY_RUN: "0"
          PUSH: "1"
        run: |
          ./scripts/release-modules.sh "${{ inputs.version }}"
