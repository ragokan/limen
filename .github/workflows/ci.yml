name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"

      - name: Run tests
        run: ./scripts/test-modules.sh --race

      - name: Check internal module versions
        run: ./scripts/check-internal-module-versions.sh

  standalone:
    name: Standalone modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"

      - name: Test modules outside go.work
        run: ./scripts/test-standalone-modules.sh --all --local-replace

  postgres:
    name: PostgreSQL 18
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"

      - name: Run PostgreSQL integration tests
        run: ./scripts/test-postgres18.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: Run linter
        run: golangci-lint run ./...
