name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"

      - name: Run benchmarks
        env:
          BENCH_NAME: ci-${{ github.run_id }}
          BENCH_COUNT: "3"
        run: ./scripts/ci-benchmarks.sh

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/*
